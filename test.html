<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #box {
        position: relative;
        width: var(--imageWidth);
        height: var(--height);
        overflow: hidden;
      }
      #multi-circles {
        position: absolute;
        right: 30px;
        bottom: 10px;
        z-index: 2;
      }
      #multi-images {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 1;
        width: calc(var(--imageWidth) * 5);
        height: var(--height);
      }
      #arrow-right,
      #arrow-left {
        position: absolute;
        top: 50%;
        margin-top: -20px;
        height: 40px;
        z-index: 3;
      }
      #arrow-right {
        right: 0;
      }
      #arrow-left {
        left: 0;
      }
    </style>
  </head>
  <body>
    <div id="box">
      <img
        src="https://img-blog.csdnimg.cn/20210223144036732.png"
        id="arrow-left"
      />
      <img
        src="https://img-blog.csdnimg.cn/20210223144036732.png"
        id="arrow-right"
      />
      <ul id="multi-circles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
      <div id="multi-images">
        <img src="https://lupic.cdn.bcebos.com/20210629/2933_14.jpg" />
        <img src="https://lupic.cdn.bcebos.com/20210629/2933_14.jpg" />
        <img src="https://lupic.cdn.bcebos.com/20210629/2933_14.jpg" />
        <img src="https://lupic.cdn.bcebos.com/20210629/2933_14.jpg" />
        <img src="https://lupic.cdn.bcebos.com/20210629/2933_14.jpg" />
        <div class="clear"></div>
      </div>
    </div>
  </body>
</html>
<script>
  //先dom操作，获取html组件
  var arrowLeft = document.getElementById("arrow-left");
  var arrowRight = document.getElementById("arrow-right");
  var multiImages = document.getElementById("multi-images");
  var circles = document
    .getElementById("multi-circles")
    .getElementsByTagName("li");
  var box = document.getElementById("box");

  //为箭头和圆点绑定事件
  arrowLeft.addEventListener("click", preMove);
  arrowRight.addEventListener("click", nextMove);
  for (let i = 0; i < circles.length; i++) {
    circles[i].setAttribute("id", i);
    circles[i].addEventListener("mouseenter", overCircle);
  }

  //滑过圆点
  function overCircle() {
    currentIndex = parseInt(this.id);
  }
  //左箭头
  function preMove() {
    if (currentIndex != 0) {
      currentIndex--;
    } else {
      currentIndex = 4;
    }
  }
  //右箭头
  function nextMove() {
    if (currentIndex != 4) {
      currentIndex++;
    } else {
      currentIndex = 0;
    }
  }
</script>
